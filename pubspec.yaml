name: apartment_app
description: Apartment Management System - Cross Platform Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP Client
  dio: ^5.4.3+1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI/Charts
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.20.2
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.1
  permission_handler: ^11.3.1

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # WebSocket
  web_socket_channel: ^3.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
